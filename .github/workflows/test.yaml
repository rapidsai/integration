name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: |
          branch: git branch the workflow run targets.
          Required even when 'sha' is provided because it is also used for organizing artifacts.
        required: true
        type: string
      date:
        description: "date: Date (YYYY-MM-DD) this run is for. Used to organize artifacts produced by nightly builds"
        required: true
        type: string
      sha:
        description: "sha: full git commit SHA to check out"
        required: true
        type: string

jobs:
  test-conda-nightly-env:
    secrets: inherit
    # We use a build workflow so that we get CPU jobs and high matrix coverage
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-build.yaml@main
    with:
      build_type: pull-request
      script: "ci/test_conda_nightly_env.sh"
      # just using the workflow to get the matrix, this isn't actually building anything we want to upload
      upload-artifacts: false
  test-stable-install-pip-cuda-12:
    uses: rapidsai/shared-workflows/.github/workflows/custom-job.yaml@main
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    with:
      build_type: pull-request
      node_type: "cpu4"
      arch: "${{matrix.arch}}"
      container_image: "rapidsai/citestwheel:cuda12.9.1-ubuntu24.04-py3.14"
      script: |
        ./ci/stable_install/install_and_test_pip.sh --cuda cu12
  test-stable-install-pip-cuda-13:
    secrets: inherit
    uses: rapidsai/shared-workflows/.github/workflows/custom-job.yaml@main
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    with:
      build_type: pull-request
      node_type: "cpu4"
      arch: "${{matrix.arch}}"
      container_image: "rapidsai/citestwheel:cuda13.2.0-ubuntu24.04-py3.14"
      script: |
        ./ci/stable_install/install_and_test_pip.sh --cuda cu13
  test-stable-install-conda:
    secrets: inherit
    uses: rapidsai/shared-workflows/.github/workflows/custom-job.yaml@main
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    with:
      build_type: pull-request
      node_type: "cpu4"
      arch: "${{matrix.arch}}"
      container_image: "rapidsai/ci-conda:26.04-latest"
      script: |
        ./ci/stable_install/install_and_test_conda.sh
