name: pr

on:
  push:
    branches:
      - "pull-request/[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pr-builder:
    needs:
      - build
      - checks
      - check-nightly-ci
      - test-conda-nightly-env
    uses: rapidsai/shared-workflows/.github/workflows/pr-builder.yaml@main
    permissions:
      contents: read
  check-nightly-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Get PR Info
        id: get-pr-info
        uses: nv-gha-runners/get-pr-info@090577647b8ddc4e06e809e264f7881650ecdccf # main
      - name: Check if nightly CI is passing
        uses: rapidsai/shared-actions/check_nightly_success/dispatch@main
        with:
          # this project's nightlies only run if all other RAPIDS nightly builds pass, so allow
          # it more than the default 7 days
          max-days-without-success: 14
          repo: ${{ github.repository }}
          target-branch: ${{ fromJSON(steps.get-pr-info.outputs.pr-info).base.ref }}
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
  build:
    needs: checks
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-build.yaml@main
    with:
      build_type: pull-request
      script: ci/build_python.sh
      pure-conda: cuda_major
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  test-conda-nightly-env:
    needs: checks
    secrets: inherit # zizmor: ignore[secrets-inherit]
    # We use a build workflow so that we get CPU jobs and high matrix coverage
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-build.yaml@main
    with:
      build_type: pull-request
      script: "ci/test_conda_nightly_env.sh"
      # just using the workflow to get the matrix, this isn't actually building anything we want to upload
      upload-artifacts: false
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
